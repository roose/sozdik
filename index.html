<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <title>Қазақша Сөздік</title>
    <link rel="stylesheet" href="./src/style.css">
</head>
<body>

    <div class="search-box">
        <input type="text" id="searchInput" placeholder="Загрузка..." autofocus disabled>
    </div>

    <div class="buttons">
        <button class="btn-kz" data-char='ә'>ә</button>
        <button class="btn-kz" data-char='і'>і</button>
        <button class="btn-kz" data-char='ң'>ң</button>
        <button class="btn-kz" data-char='ғ'>ғ</button>
        <button class="btn-kz" data-char='ү'>ү</button>
        <button class="btn-kz" data-char='ұ'>ұ</button>
        <button class="btn-kz" data-char='қ'>қ</button>
        <button class="btn-kz" data-char='ө'>ө</button>
        <button class="btn-kz" data-char='һ'>һ</button>
    </div>

    <div id="results"></div>
    <div id="toast">Скопировано!</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
